<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Habit Tracker Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <header class="page-header">
    <div>
      <h1>Admin Panel</h1>
      <p class="subtitle">Manage habit tracker data</p>
    </div>

    <a href="/">Back to dashboard</a>
  </header>

  <section class="card">
    <h2>Daily Phrases</h2>

    <div class="add-form">
      <input id="adminPhrase" type="text" placeholder="Phrase">
      <input id="adminAuthor" type="text" placeholder="Author">

      <button type="button" onclick="addDailyPhraseAdmin()">
        Add phrase
      </button>
    </div>

    <div id="adminDailyPhrases" class="list">
      Loading...
    </div>
  </section>
</main>

<script src="admin.js"></script>
</body>
</html>
