<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
    <header class="page-header">
        <div>
            <h1>Habit Tracker</h1>
            <p class="subtitle">Spring Boot</p>
        </div>
        <time id="systemTime">Loading time...</time>
    </header>

    <section class="card add-card">
        <h2>Add habit</h2>
        <div class="add-form">
            <input id="habitName" type="text" placeholder="Habit name" aria-label="Habit name">

            <select id="habitPriority" aria-label="Habit priority">
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>

            <label class="checkbox-label">
                <input id="habitRequiredToday" type="checkbox">
                Must today
            </label>

            <button type="button" onclick="addHabit()">Add</button>
        </div>
    </section>

    <div class="dashboard-grid">
        <div class="dashboard-column">
            <section class="card">
                <h2>Today</h2>
                <h3>Future Self Bank</h3>
                <h3>Daily Phrase</h3>
                <div id ="dailyPhrase">Loading...</div>

                <p id="dayStatus" class="status-text">Loading...</p>

                <div id="stats">Loading...</div>
                <div class="progress" aria-label="Daily progress">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
            </section>

            <section class="card">
                <h2>Records</h2>
                <div id="historyStats" class="list">Loading...</div>
            </section>

            <section class="card">
                <h2>Habits</h2>
                <div id="habits" class="list">Loading...</div>
            </section>
        </div>

        <div class="dashboard-column">
            <section class="card">
                <h2>Weekly summary</h2>
                <div id="weeklySummary">Loading...</div>
            </section>

            <section class="card">
                <h2>Active</h2>
                <div id="notCompletedHabits" class="list">Loading...</div>
            </section>

            <section class="card">
                <h2>Days since</h2>

                <div class="days-since-form">
                    <input id="daysSinceName" type="text" placeholder="No scrolling" aria-label="Counter name">
                    <input id="daysSinceStartDate" type="date" aria-label="Counter start date">
                    <button type="button" onclick="addDaysSince()">Add</button>
                </div>

                <div id="daysSince" class="list">Loading...</div>
            </section>
        </div>
    </div>

    <div id="editModal" class="modal hidden">
        <div class="modal-content">
            <h2>Edit habit</h2>

            <input id="editHabitName" type="text" placeholder="Habit name">

            <select id="editHabitPriority">
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>

            <label class="checkbox-label">
                <input id="editHabitRequiredToday" type="checkbox">
                Must today
            </label>

            <div class="actions">
                <button type="button" onclick="saveEditHabit()">Save</button>
                <button type="button" class="button-secondary" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

</main>

<script src="app.js"></script>
</body>
</html>
